<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Moment — 우연히 마주치는 추억</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Batang:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500;1,600&family=Caveat:wght@400;500;600&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --cream: #FAF6F0;
    --cream-deep: #F2EADC;
    --terra: #D4824A;
    --terra-deep: #B86A36;
    --sepia: #3D2E1F;
    --sepia-soft: #6B5840;
    --sepia-mute: #9C8770;
    --paper: #FFFDF7;
    --shadow: rgba(61, 46, 31, 0.12);
  }
  html, body { background: #1a1714; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--sepia);
    -webkit-font-smoothing: antialiased;
  }
  .serif-kr { font-family: 'Nanum Myeongjo', 'Gowun Batang', serif; }
  .serif-en { font-family: 'Playfair Display', serif; font-style: italic; }
  .hand { font-family: 'Gaegu', 'Caveat', cursive; }

  /* film grain overlay */
  .grain::after {
    content: '';
    position: absolute; inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.24 0 0 0 0 0.18 0 0 0 0 0.12 0 0 0 0.5 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/></svg>");
    mix-blend-mode: multiply;
    opacity: 0.18;
  }

  /* polaroid */
  .polaroid {
    background: var(--paper);
    padding: 10px 10px 36px 10px;
    box-shadow:
      0 1px 2px rgba(0,0,0,0.08),
      0 8px 24px -8px rgba(61, 46, 31, 0.28),
      inset 0 0 0 1px rgba(61,46,31,0.04);
    border-radius: 2px;
  }
  .polaroid-photo {
    background: #d9cdb8;
    position: relative;
    overflow: hidden;
  }
  .polaroid-photo img {
    width: 100%; height: 100%; object-fit: cover;
    filter: sepia(0.28) saturate(0.85) contrast(0.95) brightness(0.97);
  }
  .polaroid-photo::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,240,210,0.18), transparent 30%, rgba(61,46,31,0.10));
    pointer-events: none;
  }

  /* faded film for discovery screen */
  .film-faded .polaroid-photo img {
    filter: sepia(0.45) saturate(0.7) contrast(0.88) brightness(1.02);
  }

  /* page transitions */
  .page-enter { animation: fadeIn 420ms ease-out both; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .slow-fade { animation: slowFade 1100ms ease-out both; }
  @keyframes slowFade {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* pulse pin */
  .pulse-ring {
    position: absolute; inset: -10px;
    border-radius: 9999px;
    border: 2px solid var(--terra);
    animation: pulse 2s ease-out infinite;
  }
  .pulse-ring.delay { animation-delay: 1s; }
  @keyframes pulse {
    0%   { transform: scale(0.6); opacity: 0.9; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  /* audio wave */
  .wave-bar {
    display: inline-block;
    width: 2.5px;
    margin: 0 1.5px;
    background: var(--terra);
    border-radius: 2px;
    animation: wave 1.2s ease-in-out infinite;
  }
  @keyframes wave {
    0%, 100% { height: 6px; }
    50%      { height: 22px; }
  }

  /* map background */
  .vintage-map {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(212,130,74,0.10), transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(155, 132, 96, 0.12), transparent 55%),
      linear-gradient(180deg, #efe3cf 0%, #e8d9bd 100%);
  }

  /* hide scrollbar */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }

  /* tap feedback */
  .tappable { transition: transform 120ms ease, opacity 120ms ease; }
  .tappable:active { transform: scale(0.97); opacity: 0.9; }

  /* handwritten ink */
  .ink { color: var(--sepia); text-shadow: 0 0 0.5px var(--sepia); }

  /* dotted route for map */
  .dot-route {
    background-image: radial-gradient(circle, rgba(61,46,31,0.35) 1px, transparent 1.4px);
    background-size: 8px 8px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

/* ---------- shared image pool (picsum, stable seeds) ---------- */
const IMG = {
  cafe:    'https://picsum.photos/seed/moment-cafe/600/700',
  street:  'https://picsum.photos/seed/moment-street/600/700',
  beach:   'https://picsum.photos/seed/moment-beach/600/700',
  window:  'https://picsum.photos/seed/moment-window/600/700',
  rain:    'https://picsum.photos/seed/moment-rain/600/700',
  flower:  'https://picsum.photos/seed/moment-flower/600/700',
  friends: 'https://picsum.photos/seed/moment-friends/600/700',
  sunset:  'https://picsum.photos/seed/moment-sunset/600/700',
  album1:  'https://picsum.photos/seed/album-blue-green/200/200',
  album2:  'https://picsum.photos/seed/album-rain/200/200',
  album3:  'https://picsum.photos/seed/album-summer/200/200',
  pf1:     'https://i.pravatar.cc/120?img=47',
  pf2:     'https://i.pravatar.cc/120?img=32',
  pf3:     'https://i.pravatar.cc/120?img=15',
};

/* ---------- atoms ---------- */
function Polaroid({ src, rotate = 0, w = 180, h = 200, caption, className = '', faded = false, style = {}, children }) {
  return (
    <div
      className={`polaroid ${faded ? 'film-faded' : ''} ${className}`}
      style={{ width: w, transform: `rotate(${rotate}deg)`, ...style }}
    >
      <div className="polaroid-photo" style={{ width: '100%', height: h }}>
        {src && <img src={src} alt="" loading="lazy" />}
        {children}
      </div>
      {caption && (
        <div className="hand text-center mt-2 text-[15px]" style={{ color: 'var(--sepia-soft)' }}>
          {caption}
        </div>
      )}
    </div>
  );
}

function StatusBar() {
  return (
    <div className="flex items-center justify-between px-7 pt-3 pb-1 text-[14px] font-semibold" style={{ color: 'var(--sepia)' }}>
      <span>9:41</span>
      <div className="flex items-center gap-1.5">
        <svg width="17" height="11" viewBox="0 0 17 11" fill="none"><path d="M1 7.5L1 9.5M5 5.5L5 9.5M9 3.5L9 9.5M13 1.5L13 9.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
        <svg width="15" height="11" viewBox="0 0 15 11" fill="none"><path d="M7.5 2C9.7 2 11.7 2.85 13.2 4.3M4 5.5C5 4.5 6.2 4 7.5 4C8.8 4 10 4.5 11 5.5M7.5 7.5L7.5 7.5M1.8 1.5C3.4 0.5 5.4 0 7.5 0C9.6 0 11.6 0.5 13.2 1.5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/></svg>
        <svg width="24" height="11" viewBox="0 0 24 11" fill="none"><rect x="0.5" y="0.5" width="20" height="10" rx="2.5" stroke="currentColor" opacity="0.5"/><rect x="2" y="2" width="15" height="7" rx="1" fill="currentColor"/><rect x="21" y="4" width="1.5" height="3" rx="0.5" fill="currentColor" opacity="0.5"/></svg>
      </div>
    </div>
  );
}

function HomeIndicator() {
  return (
    <div className="flex justify-center pb-2 pt-1">
      <div className="w-32 h-[5px] rounded-full" style={{ background: 'var(--sepia)', opacity: 0.35 }} />
    </div>
  );
}

/* ---------- icons ---------- */
const Ico = {
  bell: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" {...p}><path d="M6 8a6 6 0 1 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>,
  plus: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" {...p}><path d="M12 5v14M5 12h14" strokeLinecap="round"/></svg>,
  map:  (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" {...p}><path d="M9 3L3 5v16l6-2 6 2 6-2V3l-6 2-6-2z"/><path d="M9 3v16M15 5v16"/></svg>,
  user: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" {...p}><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>,
  lock: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" {...p}><rect x="5" y="11" width="14" height="10" rx="1.5"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>,
  pin:  (p) => <svg viewBox="0 0 24 24" fill="currentColor" {...p}><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>,
  pinSm:(p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" {...p}><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>,
  cal:  (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" {...p}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>,
  music:(p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" {...p}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>,
  back: (p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" {...p}><path d="M15 18l-6-6 6-6" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  close:(p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" {...p}><path d="M6 6l12 12M18 6L6 18" strokeLinecap="round"/></svg>,
  heart:(p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" {...p}><path d="M12 21s-7-4.5-9.5-9C1 9 2.5 5 6.5 5c2 0 3.5 1 5.5 3 2-2 3.5-3 5.5-3 4 0 5.5 4 4 7-2.5 4.5-9.5 9-9.5 9z"/></svg>,
  reply:(p) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" {...p}><path d="M9 14l-5-5 5-5"/><path d="M4 9h10c4 0 7 3 7 7v2"/></svg>,
  play: (p) => <svg viewBox="0 0 24 24" fill="currentColor" {...p}><path d="M7 4v16l13-8L7 4z"/></svg>,
  pause:(p) => <svg viewBox="0 0 24 24" fill="currentColor" {...p}><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>,
};

/* ============================================================
   SCREEN 1: ONBOARDING
   ============================================================ */
function Onboarding({ go }) {
  return (
    <div className="page-enter relative h-full flex flex-col" style={{ background: 'var(--cream)' }}>
      {/* hero collage */}
      <div className="relative grain" style={{ height: '62%', overflow: 'hidden' }}>
        {/* faux vintage map backdrop */}
        <div className="absolute inset-0 vintage-map" />
        {/* contour lines */}
        <svg className="absolute inset-0 w-full h-full" viewBox="0 0 393 530" preserveAspectRatio="none" style={{ opacity: 0.35 }}>
          <g stroke="#9C8770" fill="none" strokeWidth="0.6">
            <path d="M-20 80 Q 100 60 200 100 T 420 90" />
            <path d="M-20 140 Q 120 110 240 150 T 420 140" />
            <path d="M-20 220 Q 80 200 180 230 T 420 220" />
            <path d="M-20 310 Q 140 280 260 320 T 420 320" />
            <path d="M-20 400 Q 100 380 220 410 T 420 410" />
            <path d="M-20 470 Q 150 440 270 470 T 420 470" />
          </g>
          <g stroke="#D4824A" strokeDasharray="3 6" strokeWidth="1.2" fill="none" opacity="0.55">
            <path d="M 60 380 Q 130 300 200 260 T 330 130" />
          </g>
        </svg>
        {/* compass mark */}
        <div className="absolute top-12 right-6 hand text-[13px]" style={{ color: 'var(--sepia-mute)' }}>
          N ↑
        </div>

        {/* pinned polaroids */}
        <div className="absolute" style={{ top: 70, left: 28 }}>
          <Polaroid src={IMG.cafe} rotate={-9} w={138} h={150} caption="봄 · 성수" />
          <div className="absolute -top-2 left-1/2 -translate-x-1/2 w-3 h-3 rounded-full" style={{ background: 'var(--terra)', boxShadow: '0 2px 4px rgba(0,0,0,0.25)' }} />
        </div>
        <div className="absolute" style={{ top: 110, right: 22 }}>
          <Polaroid src={IMG.window} rotate={7} w={128} h={140} caption="비 오는 날" />
          <div className="absolute -top-2 left-1/2 -translate-x-1/2 w-3 h-3 rounded-full" style={{ background: 'var(--terra)', boxShadow: '0 2px 4px rgba(0,0,0,0.25)' }} />
        </div>
        <div className="absolute" style={{ bottom: 30, left: 60 }}>
          <Polaroid src={IMG.beach} rotate={-4} w={150} h={160} caption="안목, 여름" />
          <div className="absolute -top-2 left-1/2 -translate-x-1/2 w-3 h-3 rounded-full" style={{ background: 'var(--terra)', boxShadow: '0 2px 4px rgba(0,0,0,0.25)' }} />
        </div>
        <div className="absolute" style={{ bottom: 60, right: 30 }}>
          <Polaroid src={IMG.friends} rotate={11} w={120} h={132} caption="우리들" />
          <div className="absolute -top-2 left-1/2 -translate-x-1/2 w-3 h-3 rounded-full" style={{ background: 'var(--terra)', boxShadow: '0 2px 4px rgba(0,0,0,0.25)' }} />
        </div>

        {/* gradient fade to copy */}
        <div className="absolute inset-x-0 bottom-0 h-24" style={{ background: 'linear-gradient(180deg, transparent, var(--cream))' }} />
      </div>

      {/* copy */}
      <div className="flex-1 flex flex-col px-8 pt-3 pb-8">
        <p className="serif-en text-[15px] tracking-wider" style={{ color: 'var(--terra)' }}>moment</p>
        <h1 className="serif-kr font-extrabold leading-[1.15] mt-3" style={{ fontSize: 34, color: 'var(--sepia)', letterSpacing: '-0.01em' }}>
          우연히 마주치는<br/>추억
        </h1>
        <p className="mt-5 text-[15px] leading-[1.75]" style={{ color: 'var(--sepia-soft)' }}>
          장소가 기억을 재생합니다.<br/>
          당신의 발걸음이 닿는 곳마다,<br/>
          그때의 우리가 있습니다.
        </p>
        <div className="mt-auto pt-6">
          <button
            onClick={() => go('home')}
            className="tappable w-full py-4 rounded-full text-[16px] font-semibold tracking-wide"
            style={{ background: 'var(--terra)', color: '#FFFDF7', boxShadow: '0 8px 20px -8px rgba(212,130,74,0.6)' }}
          >
            시작하기
          </button>
          <p className="text-center mt-4 text-[12px]" style={{ color: 'var(--sepia-mute)' }}>
            이미 가입했어요 &nbsp;·&nbsp; 둘러보기
          </p>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   SCREEN 2: MAP HOME
   ============================================================ */
function MapHome({ go }) {
  return (
    <div className="page-enter relative h-full flex flex-col" style={{ background: 'var(--cream)' }}>
      {/* top bar */}
      <div className="flex items-center justify-between px-6 pt-2 pb-3 z-20 relative">
        <div>
          <p className="serif-en text-[22px]" style={{ color: 'var(--terra)' }}>moment</p>
        </div>
        <button onClick={() => go('accept')} className="tappable relative w-10 h-10 flex items-center justify-center rounded-full" style={{ background: 'rgba(255,253,247,0.7)' }}>
          <Ico.bell width="20" height="20" style={{ color: 'var(--sepia)' }} />
          <span className="absolute top-2 right-2 w-2 h-2 rounded-full" style={{ background: '#C44A2E', boxShadow: '0 0 0 2px var(--cream)' }} />
        </button>
      </div>

      {/* map */}
      <div className="relative flex-1 mx-4 mb-2 rounded-2xl overflow-hidden grain" style={{ background: '#e8d9bd', boxShadow: 'inset 0 0 0 1px rgba(61,46,31,0.08)' }}>
        <div className="absolute inset-0 vintage-map" />

        {/* roads / contours */}
        <svg className="absolute inset-0 w-full h-full" viewBox="0 0 360 600" preserveAspectRatio="xMidYMid slice">
          {/* river */}
          <path d="M -20 380 Q 80 340 160 360 T 380 320" stroke="#a8c3c9" strokeWidth="22" fill="none" opacity="0.7"/>
          <path d="M -20 380 Q 80 340 160 360 T 380 320" stroke="#bcd2d8" strokeWidth="14" fill="none" opacity="0.9"/>
          {/* roads */}
          <g stroke="#cdb893" strokeWidth="2" fill="none" opacity="0.7">
            <path d="M 0 120 L 360 140" />
            <path d="M 60 0 L 80 600" />
            <path d="M 200 0 Q 220 200 200 400 T 240 600" />
            <path d="M 0 240 Q 120 250 220 220 T 360 230" />
            <path d="M 0 500 L 360 500" />
            <path d="M 280 0 L 300 600" />
          </g>
          <g stroke="#b89a6d" strokeWidth="0.8" fill="none" opacity="0.4">
            <path d="M 30 60 L 360 80" />
            <path d="M 0 180 L 360 200" />
            <path d="M 0 300 L 360 290" />
            <path d="M 0 460 L 360 470" />
            <path d="M 140 0 L 160 600" />
            <path d="M 330 0 L 340 600" />
          </g>
          {/* park blobs */}
          <g fill="#c8d3a8" opacity="0.55">
            <ellipse cx="120" cy="100" rx="55" ry="32"/>
            <ellipse cx="290" cy="450" rx="48" ry="38"/>
          </g>
          {/* dotted walking route */}
          <path d="M 90 510 Q 130 460 180 440 T 260 380" stroke="#D4824A" strokeWidth="1.5" strokeDasharray="2 5" fill="none" opacity="0.6"/>
        </svg>

        {/* labels */}
        <div className="absolute hand text-[12px]" style={{ top: 30, left: 32, color: 'var(--sepia-mute)' }}>성수</div>
        <div className="absolute hand text-[12px]" style={{ top: 120, right: 28, color: 'var(--sepia-mute)' }}>한남</div>
        <div className="absolute hand text-[12px]" style={{ top: 380, left: 50, color: 'var(--sepia-mute)' }}>망원</div>
        <div className="absolute hand text-[11px]" style={{ top: 220, left: '52%', color: '#6b8a90' }}>한강</div>

        {/* my memory pins */}
        <MemoryPin top="14%" left="22%" thumb={IMG.cafe} onTap={() => {}} />
        <MemoryPin top="9%"  left="62%" thumb={IMG.flower} />
        <MemoryPin top="44%" left="74%" thumb={IMG.sunset} />
        <MemoryPin top="58%" left="18%" thumb={IMG.friends} />
        <MemoryPin top="76%" left="58%" thumb={IMG.street} />

        {/* friend pins (sepia + lock) */}
        <FriendPin top="26%" left="44%" />
        <FriendPin top="64%" left="40%" />
        <FriendPin top="82%" left="80%" />

        {/* discoverable pulse pin */}
        <button
          onClick={() => go('discover')}
          className="absolute -translate-x-1/2 -translate-y-1/2 group"
          style={{ top: '50%', left: '46%' }}
        >
          <div className="relative">
            <span className="pulse-ring" />
            <span className="pulse-ring delay" />
            <div className="relative w-10 h-10 rounded-full flex items-center justify-center"
                 style={{ background: 'var(--terra)', boxShadow: '0 6px 14px -4px rgba(212,130,74,0.6)' }}>
              <div className="w-3 h-3 rounded-full" style={{ background: 'var(--paper)' }} />
            </div>
            <span className="absolute top-full left-1/2 -translate-x-1/2 mt-2 whitespace-nowrap text-[11px] px-2 py-1 rounded-md hand"
                  style={{ background: 'var(--paper)', color: 'var(--terra-deep)', boxShadow: '0 4px 10px rgba(0,0,0,0.1)' }}>
              발견 가능한 추억
            </span>
          </div>
        </button>

        {/* current location dot */}
        <div className="absolute -translate-x-1/2 -translate-y-1/2" style={{ top: '70%', left: '36%' }}>
          <div className="w-3 h-3 rounded-full" style={{ background: '#3b6fb3', boxShadow: '0 0 0 4px rgba(59,111,179,0.25), 0 0 0 1.5px white' }} />
        </div>

/* ============================================================
   APP SHELL  — phone frame + page router
   ============================================================ */
const PAGES = {
  onboarding: Onboarding,
  home:       MapHome,
  capture:    Capture,
  discover:   Discover,
  accept:     Accept,
};
const ORDER = ['onboarding', 'home', 'capture', 'discover', 'accept'];

function App() {
  const [page, setPage] = useState('onboarding');
  const [pageKey, setPageKey] = useState(0); // forces remount → re-runs entry animation

  const go = (next) => {
    if (next === page) return;
    setPage(next);
    setPageKey(k => k + 1);
  };

  const PageComp = PAGES[page];

  return (
    <div className="min-h-screen w-full flex items-center justify-center py-6 px-4">
      <div className="flex flex-col items-center gap-4 w-full">
        {/* phone */}
        <div className="relative" style={{ width: 393, height: 852 }}>
          {/* bezel */}
          <div className="absolute -inset-[10px] rounded-[58px]" style={{
            background: 'linear-gradient(160deg, #2a2520, #14110d)',
            boxShadow: '0 30px 60px -20px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.05)'
          }}/>
          <div className="absolute inset-0 rounded-[48px] overflow-hidden" style={{ background: 'var(--cream)' }}>
            <StatusBar/>
            {/* dynamic island */}
            <div className="absolute top-2.5 left-1/2 -translate-x-1/2 w-[110px] h-[32px] rounded-full z-30" style={{ background: '#000' }} />
            <div className="absolute inset-x-0 top-[34px] bottom-[18px] flex flex-col" key={pageKey}>
              <PageComp go={go}/>
            </div>
            <div className="absolute inset-x-0 bottom-0">
              <HomeIndicator/>
            </div>
          </div>
        </div>

        {/* screen switcher for interview demo */}
        <div className="flex flex-wrap items-center justify-center gap-2 mt-2 max-w-[420px]">
          {ORDER.map((p, i) => (
            <button key={p}
              onClick={() => go(p)}
              className="tappable text-[11px] px-3 py-1.5 rounded-full transition-colors"
              style={{
                background: page === p ? 'var(--terra)' : 'rgba(250,246,240,0.12)',
                color: page === p ? '#fff' : 'rgba(250,246,240,0.7)',
                border: page === p ? 'none' : '1px solid rgba(250,246,240,0.18)'
              }}>
              {i + 1}. {labelOf(p)}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function labelOf(p){
  return {
    onboarding: '온보딩',
    home:       '지도 홈',
    capture:    '박제하기',
    discover:   '우연한 발견',
    accept:     '추억 수락',
  }[p];
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
